<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="indovinaLaParola.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <title>Indovina La Parola</title>
</head>

<body>
    <h1 class="text-center fw-bold text-uppercase game-title">
        <span class="text-gradient">
            Trova la Parola
        </span>
    </h1>

    <div class="container py-0">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="text-start">
                    <span id="idContatoreErrori" class="cuoricini nascondere"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="rotateScreen" class="rotate-overlay">
        <div class="rotate-box">
            <p class="fs-5 mb-2">📱 Ruota il tuo dispositivo</p>
            <p class="text-muted mb-3">Per una migliore esperienza di gioco</p>

            <button id="idBtnRotate" class="btn text-white w-100 fw-semibold" onclick="closeRotateOverlay()">
                Continua comunque
            </button>
        </div>
    </div>

    <div class="container py-2">

        <div class="row justify-content-center">

            <div class="col-12 col-md-10 col-lg-8">


                <!-- Inserimento parola -->
                <div id="idParolaIniziale" class="text-center mb-3">

                    <h1 class="display-6 mb-3 fw-normal">
                        Inserisci una frase o una parola
                    </h1>

                    <form class="d-flex flex-column flex-md-row gap-2 justify-content-center"
                        onsubmit="inserisciParola(); return false;">

                        <button type="button" id="idBtnRandom" class="btn btn-primary flex-shrink-0" onclick="fraseCasuale()">
                            Frase Casuale
                        </button>

                        <input oninput="conteggioCaratteriDigitati()" id="idInputParola" class="form-control flex-grow-1"
                            placeholder="Scrivi qualcosa..." type="text" autofocus>

                        <button id="idBtnParola" class="btn text-white flex-shrink-0">
                            Inserisci
                        </button>

                    </form>

                    <h4 id="alertLimite" class="nascondere mt-3 text-danger">
                        Hai raggiunto il limite di 50 caratteri
                    </h4>

                </div>

                <!-- Punteggio -->
                <div class="d-flex flex-wrap justify-content-center justify-content-sm-between align-items-center gap-2 mb-3">

                    <h4 id="idPunteggio" class="mb-0">
                        Punteggio: 0
                    </h4>

                    <span id="idBadgeVocale" class="badge-vocale nascondere">
                     Vocale: <span id="idCostoVocale">5</span> pt
                    </span>

                    <div class="d-flex gap-2">
                        <button class="btn btn-info text-white" id="idBtnInfoPunteggio" onclick="btnInfoPunteggio()">
                            Info
                        </button>

                        <button class="btn btn-warning" id="idBtnNuovaPartita" onclick="nuovaPartita()">
                            🔄 Nuova
                        </button>
                    </div>

                </div>

                <!-- Contatore -->
                <div id="idDivContatore" class="nascondere text-center mb-3">

                    <form class="d-flex flex-column flex-sm-row gap-2 justify-content-center"
                        onsubmit="inserisciLettera(); return false;">
                        <div class="d-flex justify-content-center">
                            <input oninput="letteraSingola()" id="idInputLettera" class="form-control text-center"
                                maxlength="1" type="text">
                        </div>


                        <button id="idBtnLettera" class="btn text-white ">
                            Inserisci
                        </button>

                    </form>

                </div>

                <!-- Parola -->
                <div class="divParolaCreata text-center mb-3 nascondere" id="idParolaCreata">
                </div>

                <!-- Footer -->
                <footer class="d-flex flex-column align-items-stretch gap-2 mb-3">

                    <h3 class="nascondere mb-0 text-start" id="idH3">
                        Hai la soluzione?
                    </h3>

                    <div class="w-100 d-flex align-items-center gap-2 justify-content-center flex-nowrap">

                        <!-- INPUT SOLUZIONE -->
                        <form class="flex-grow-1" onsubmit="soluzione(); return false;">
                            <input oninput="tentativoSoluzione()" class="form-control nascondere text-center"
                                id="idInputSoluzione" placeholder="Prova a scriverla qui!" type="text">
                        </form>

                        <!-- MIC -->
                        <button id="idMic" class="btn btn-outline-secondary nascondere flex-shrink-0" onclick="startMicrofono()">

                            <img src="microfono.svg" alt="Microfono">
                        </button>

                        <!-- VOLUME -->
                        <button class="btn flex-shrink-0" id="toggleMusic" onclick="musicaOnOff()">

                            <img src="volume10.png" alt="Volume">
                        </button>

                    </div>

                </footer>

            </div>

        </div>

    </div>

    <script src="indovinaLaParola.js"></script>

</body>

</html>
